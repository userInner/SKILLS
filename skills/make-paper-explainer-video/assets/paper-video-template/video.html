<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}html,body{margin:0;width:1080px;height:1920px;overflow:hidden;background:#dad7d0;font-family:"PingFang SC",sans-serif}.stage{position:relative;width:1080px;height:1920px}.scene{position:absolute;inset:0;opacity:0}.paper{position:absolute;width:920px;left:80px;top:80px;filter:drop-shadow(0 20px 20px #0004)}.caption{position:absolute;left:50px;right:50px;bottom:220px;text-align:center;color:#fff;font-size:60px;font-weight:900;-webkit-text-stroke:8px #111;paint-order:stroke fill}.caption b{color:#ffdc36}.source{position:absolute;left:40px;right:40px;bottom:45px;display:flex;justify-content:space-between;color:#444;font-size:22px}.cover-mode .caption,.cover-mode .source{display:none}
</style></head><body><main class="stage">
<section class="scene" id="s1"><img class="paper" src="pages/page_1.png"></section>
<section class="scene" id="s2"><img class="paper" src="pages/page_2.png"></section>
<div class="caption" id="caption"></div><div class="source"><span>Author et al., YEAR</span><span>DOI / arXiv</span></div>
</main><script>
const phrases=[['Public claim','<b>What the paper measured</b>'],['Study design','<b>Main result</b>']];
let timeline=[];window.configure=data=>{timeline=data.segments};
window.setCoverMode=enabled=>document.querySelector('.stage').classList.toggle('cover-mode',Boolean(enabled));
window.setFrame=time=>{let active=0;for(let i=0;i<timeline.length;i++)if(time>=timeline[i].start)active=i;const segment=timeline[active];const progress=Math.max(0,Math.min(1,(time-segment.start)/(segment.end-segment.start)));document.querySelectorAll('.scene').forEach((node,index)=>node.style.opacity=index===active?1:0);const list=phrases[Math.min(active,phrases.length-1)];document.getElementById('caption').innerHTML=list[Math.min(list.length-1,Math.floor(progress*list.length))];};
</script></body></html>
